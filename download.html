<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descargar MP3 — SonicStream</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { 
  font-family: sans-serif;
  background: #080c14;
  color: #e8eaf0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.top-bar {
  background: rgba(8,12,20,.95);
  border-bottom: 1px solid rgba(255,255,255,.06);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-shrink: 0;
}
.song-info {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.song-icon { font-size: 1.4rem; flex-shrink: 0; }
.song-title {
  font-weight: 700;
  font-size: .9rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.song-artist { font-size: .75rem; color: #6b7280; }
.back-btn {
  background: rgba(0,229,255,.1);
  border: 1px solid rgba(0,229,255,.3);
  color: #00e5ff;
  padding: 8px 16px;
  border-radius: 8px;
  text-decoration: none;
  font-size: .8rem;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}
.player-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  gap: 16px;
}
.player-wrap p {
  font-size: .85rem;
  color: #6b7280;
  text-align: center;
}
iframe {
  width: 340px;
  height: 80px;
  border: none;
  border-radius: 12px;
  overflow: hidden;
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="song-info">
    <span class="song-icon">🎵</span>
    <div>
      <div class="song-title" id="song-title">Cargando...</div>
      <div class="song-artist" id="song-artist"></div>
    </div>
  </div>
  <a class="back-btn" id="back-btn" href="music.html">← Volver</a>
</div>

<div class="player-wrap">
  <p>Haz clic en el botón verde para descargar el MP3</p>
  <iframe id="apiyt-frame" src="" title="Descargar MP3" allowfullscreen></iframe>
  <p style="font-size:.72rem;">Powered by apiyt.com</p>
</div>

<script>
// Get params from URL
var params = new URLSearchParams(window.location.search);
var videoId = params.get('vid') || '';
var title   = params.get('title') ? decodeURIComponent(params.get('title')) : 'Sin título';
var artist  = params.get('artist') ? decodeURIComponent(params.get('artist')) : '';

document.getElementById('song-title').textContent  = title;
document.getElementById('song-artist').textContent = artist;

// Load apiyt as MAIN content of this page - no iframe restrictions
if (videoId) {
  document.getElementById('apiyt-frame').src =
    'https://apiyt.com/iframe/?vid=' + videoId + '&color=2DB94D&utm_source=api';
} else {
  document.querySelector('.player-wrap p').textContent = 'Error: no se encontró el video.';
}
</script>
</body>
</html>
