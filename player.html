<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonicStream Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#e8eaf0;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:rgba(8,12,20,.95);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo{font-weight:800;font-size:1rem;color:#e8eaf0;text-decoration:none}
.logo span{color:#00e5ff}
.back{background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);color:#00e5ff;padding:6px 12px;border-radius:8px;text-decoration:none;font-size:.78rem;font-weight:600}
.video-wrap{flex:1;background:#000}
iframe{width:100%;height:calc(100vh - 90px);border:none;display:block}
.title-bar{padding:12px 16px;background:rgba(8,12,20,.9);font-size:.85rem;color:rgba(255,255,255,.7);border-top:1px solid rgba(255,255,255,.06)}
</style>
</head>
<body>
<div class="topbar">
  <a class="logo" href="musicaut.html">&#127925; Sonic<span>Stream</span></a>
  <a class="back" href="musicaut.html">&#8592; Volver</a>
</div>
<div class="video-wrap">
  <iframe id="player" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen></iframe>
</div>
<div class="title-bar" id="title-bar">Cargando...</div>
<script>
var params = new URLSearchParams(window.location.search);
var vid   = params.get('v') || '';
var title = params.get('t') ? decodeURIComponent(params.get('t')) : '';
if (title) { document.title = title + ' — SonicStream'; document.getElementById('title-bar').textContent = title; }
if (vid) {
  document.getElementById('player').src =
    'https://www.youtube-nocookie.com/embed/' + vid
    + '?playlist=' + vid + '&autoplay=1&rel=0&modestbranding=1&showinfo=0&iv_load_policy=3';
} else {
  document.getElementById('title-bar').textContent = 'Error: video no encontrado';
}
</script>
</body>
</html>
