<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonicStream — MusicAut</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--bg2:#0d1220;--bg3:#111827;--accent:#00e5ff;--accent2:#ff3d7f;--accent3:#7c4dff;--text:#e8eaf0;--muted:#6b7280;--card:#131929;--border:rgba(255,255,255,0.06);--glow:0 0 30px rgba(0,229,255,0.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 20%,rgba(0,229,255,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(124,77,255,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
header{position:sticky;top:0;z-index:100;background:rgba(8,12,20,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1.5rem}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;gap:12px}
.logo{display:flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:var(--text);text-decoration:none}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent3));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem}
.logo span{color:var(--accent)}
.back-btn{background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);color:var(--accent);padding:7px 14px;border-radius:8px;text-decoration:none;font-size:.8rem;font-weight:600}
.main{max-width:1000px;margin:0 auto;padding:2rem 1.5rem 6rem;position:relative;z-index:1}
.hero{text-align:center;margin-bottom:2rem}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);border-radius:100px;padding:5px 14px;font-size:.75rem;color:var(--accent);margin-bottom:1rem;font-weight:500}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:800;margin-bottom:.8rem}
.gradient{background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--muted);font-size:.95rem;line-height:1.7}
.search-box{background:var(--card);border:1px solid var(--border);border-radius:14px;display:flex;overflow:hidden;margin-bottom:2rem;transition:border-color .3s,box-shadow .3s}
.search-box:focus-within{border-color:rgba(0,229,255,.4);box-shadow:var(--glow)}
.search-box input{flex:1;background:none;border:none;outline:none;padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--text)}
.search-box input::placeholder{color:var(--muted)}
.search-box button{background:linear-gradient(135deg,var(--accent),var(--accent3));border:none;padding:10px 22px;margin:6px;border-radius:10px;color:#000;font-weight:700;font-size:.85rem;cursor:pointer;font-family:'DM Sans',sans-serif}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.video-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .25s;cursor:pointer}
.video-card:hover{border-color:rgba(0,229,255,.3);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.thumb-wrap{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--bg3)}
.thumb-wrap img{width:100%;height:100%;object-fit:cover}
.duration-badge{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.8);color:#fff;font-size:.7rem;font-weight:600;padding:2px 6px;border-radius:4px}
.play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);opacity:0;transition:opacity .2s}
.video-card:hover .play-overlay{opacity:1}
.play-overlay span{width:48px;height:48px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#000}
.video-info{padding:14px}
.video-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.video-meta{font-size:.75rem;color:var(--muted)}
.video-channel{color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;width:100%;max-width:800px;overflow:hidden;margin:auto}
.modal-video{width:100%;aspect-ratio:16/9;background:#000;position:relative;display:flex;align-items:center;justify-content:center}
.modal-video video{width:100%;height:100%;display:none}
.modal-loading{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--muted);font-size:.85rem}
.modal-body{padding:20px}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;margin-bottom:6px}
.modal-channel{color:var(--accent);font-size:.8rem;margin-bottom:16px}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.btn-dl{display:inline-flex;align-items:center;gap:6px;padding:11px 20px;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.btn-mp4{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#000}
.btn-mp3{background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);color:var(--accent)}
.btn-close-modal{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);cursor:pointer}
.modal-info{font-size:.75rem;color:var(--muted);line-height:1.6}
.loading{text-align:center;padding:4rem 2rem;color:var(--muted)}
.spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty .icon{font-size:3rem;margin-bottom:1rem}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:600px){.results-grid{grid-template-columns:1fr}.modal-actions{flex-direction:column}}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html"><div class="logo-icon">📻</div>Sonic<span>Stream</span></a>
    <a class="back-btn" href="index.html">← Inicio</a>
  </div>
</header>

<div class="main">
  <div class="hero">
    <div class="badge">🎬 Sin publicidad · MP4 + MP3 · Descarga directa</div>
    <h1>Music<span class="gradient">Aut</span></h1>
    <p>Busca videos y canciones. Reprodúcelos sin publicidad y descárgalos en MP4 o MP3.</p>
  </div>

  <div class="search-box">
    <input type="text" id="search-input" placeholder="Busca un video, canción o artista..." onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">🔍 Buscar</button>
  </div>

  <div id="results">
    <div class="empty"><div class="icon">🎬</div><p>Busca un video para empezar</p></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-video" id="modal-video">
      <video id="video-player" controls preload="auto"></video>
      <div class="modal-loading" id="modal-loading">
        <div class="spinner"></div>
        <span>Cargando video...</span>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-channel" id="modal-channel"></div>
      <div class="modal-actions">
        <a class="btn-dl btn-mp4" id="btn-mp4" href="#" target="_blank">⬇️ MP4</a>
        <a class="btn-dl btn-mp3" id="btn-mp3" href="#" target="_blank">🎵 MP3</a>
        <button class="btn-dl btn-close-modal" onclick="closeModal()">✕ Cerrar</button>
      </div>
      <div class="modal-info" id="modal-info">Obteniendo enlaces de descarga...</div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────
var VERCEL = 'https://sonicstream-api-to1x.vercel.app';
window._videos = {};

// ── SEARCH ───────────────────────────────────────────────
async function doSearch() {
  var q = document.getElementById('search-input').value.trim();
  if (!q) return;
  var el = document.getElementById('results');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>Buscando...</div>';

  try {
    // Use Vercel videosearch endpoint
    var res = await fetch(VERCEL + '/api/videosearch?q=' + encodeURIComponent(q));
    if (res.ok) {
      var data = await res.json();
      if (data.items && data.items.length) {
        renderResults(data.items);
        return;
      }
    }
  } catch(e) { console.warn('Search error:', e.message); }

  // Fallback: use single search multiple times
  var queries = [q, q + ' official', q + ' video', q + ' audio', q + ' live'];
  var items = [];
  for (var i = 0; i < queries.length; i++) {
    try {
      var r = await fetch(VERCEL + '/api/search?q=' + encodeURIComponent(queries[i]));
      if (r.ok) {
        var d = await r.json();
        if (d.videoId && !items.find(function(x){ return x.videoId === d.videoId; })) {
          items.push({
            videoId: d.videoId,
            title: d.title || queries[i],
            channel: '',
            thumb: 'https://i.ytimg.com/vi/' + d.videoId + '/mqdefault.jpg'
          });
        }
      }
    } catch(e2) {}
  }

  if (items.length) { renderResults(items); return; }
  el.innerHTML = '<div class="empty"><div class="icon">📭</div><p>No se encontraron resultados para "<strong>' + q + '</strong>"</p></div>';
}

function formatDuration(s) {
  if (!s) return '';
  return Math.floor(s/60) + ':' + (s%60 < 10 ? '0' : '') + s%60;
}

function renderResults(items) {
  window._videos = {};
  var html = '<div class="results-grid">';
  items.forEach(function(v, i) {
    window._videos['v'+i] = v;
    var vid  = v.videoId || '';
    var thumb = v.thumb || v.thumbnail || (vid ? 'https://i.ytimg.com/vi/'+vid+'/mqdefault.jpg' : '');
    var dur  = formatDuration(v.duration);
    var ch   = v.channel || v.uploaderName || '';
    html += '<div class="video-card" onclick="openVideo('+i+')">'
      + '<div class="thumb-wrap">'
      + (thumb ? '<img src="'+thumb+'" alt="" loading="lazy">' : '')
      + (dur ? '<span class="duration-badge">'+dur+'</span>' : '')
      + '<div class="play-overlay"><span>&#9654;</span></div>'
      + '</div>'
      + '<div class="video-info">'
      + '<div class="video-title">'+(v.title||'')+'</div>'
      + '<div class="video-meta">'+(ch?'<span class="video-channel">'+ch+'</span>':'')+'</div>'
      + '</div></div>';
  });
  html += '</div>';
  document.getElementById('results').innerHTML = html;
}

// ── PLAYER ───────────────────────────────────────────────
async function openVideo(idx) {
  var v = window._videos['v'+idx];
  if (!v) return;
  var vid = v.videoId || '';
  if (!vid) return;

  // Open modal
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-title').textContent   = v.title || '';
  document.getElementById('modal-channel').textContent = v.channel || v.uploaderName || '';
  document.getElementById('modal-info').textContent    = 'Obteniendo enlaces...';

  // Reset player
  var player = document.getElementById('video-player');
  player.src = '';
  player.style.display = 'none';
  document.getElementById('modal-loading').style.display = 'flex';

  // Reset buttons
  document.getElementById('btn-mp4').href = '#';
  document.getElementById('btn-mp3').href = '#';

  // Get MP4 via Vercel Cobalt proxy
  var gotVideo = false;
  try {
    var r4 = await fetch(VERCEL + '/api/cobalt?id=' + vid + '&type=mp4');
    if (r4.ok) {
      var d4 = await r4.json();
      if (d4.url) {
        player.src = d4.url;
        player.style.display = 'block';
        document.getElementById('modal-loading').style.display = 'none';
        player.play().catch(function(){});
        var btn4 = document.getElementById('btn-mp4');
        btn4.href = d4.url;
        btn4.setAttribute('download', (v.title||vid) + '.mp4');
        btn4.removeAttribute('target');
        btn4.textContent = '⬇️ Descargar MP4';
        gotVideo = true;
      }
    }
  } catch(e) { console.warn('MP4 failed:', e.message); }

  if (!gotVideo) {
    document.getElementById('modal-loading').innerHTML =
      '<p style="color:var(--muted);text-align:center;padding:1rem">⚠️ No se pudo cargar el video</p>';
    var btn4 = document.getElementById('btn-mp4');
    btn4.href = 'https://cobalt.tools/?url=' + encodeURIComponent('https://www.youtube.com/watch?v='+vid);
    btn4.target = '_blank';
    btn4.removeAttribute('download');
    btn4.textContent = '🎬 Ver en Cobalt';
  }

  // Get MP3 via Vercel Cobalt proxy
  try {
    var r3 = await fetch(VERCEL + '/api/cobalt?id=' + vid + '&type=mp3');
    if (r3.ok) {
      var d3 = await r3.json();
      if (d3.url) {
        var btn3 = document.getElementById('btn-mp3');
        btn3.href = d3.url;
        btn3.setAttribute('download', (v.title||vid) + '.mp3');
        btn3.removeAttribute('target');
        btn3.textContent = '⬇️ Descargar MP3';
        document.getElementById('modal-info').textContent = '✅ Listo. Haz clic en los botones para descargar.';
        return;
      }
    }
  } catch(e) { console.warn('MP3 failed:', e.message); }

  document.getElementById('modal-info').textContent = 'Descarga disponible via los botones.';
}

// ── CLOSE ─────────────────────────────────────────────────
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  var player = document.getElementById('video-player');
  player.pause();
  player.src = '';
  player.style.display = 'none';
  document.getElementById('modal-loading').style.display = 'flex';
  document.getElementById('modal-loading').innerHTML =
    '<div class="spinner"></div><span>Cargando video...</span>';
}
</script>
</body>
</html>
